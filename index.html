<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gate Rush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <span id="unit-label">Units</span>
    <span id="unit-count">5</span>
    <span id="level-label">Level <span id="level-num">1</span></span>
  </div>

  <div id="combo-mode-toggle">
    <label>
      <input type="checkbox" id="combo-mode-checkbox" checked />
      <span id="combo-mode-label">Color Combo</span>
    </label>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="overlay" class="hidden">
    <div id="overlay-box">
      <div id="overlay-icon"></div>
      <h2 id="overlay-title"></h2>
      <p id="overlay-message"></p>
      <button id="overlay-btn"></button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
